name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [17, 21]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build and test
        run: mvn -B verify -Dskip.integration.tests=true

  integration:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Start Gremlin Server
        run: |
          docker pull tinkerpop/gremlin-server:3.8.1
          docker run -d --name gremlin-server -p 8889:8182 \
            -v "${{ github.workspace }}/config/gremlin-server-docker.yaml:/opt/gremlin-server/conf/gremlin-server-docker.yaml" \
            -v "${{ github.workspace }}/config/gremlin-server-ci.properties:/opt/gremlin-server/conf/gremlin-server-ci.properties" \
            tinkerpop/gremlin-server:3.8.1 conf/gremlin-server-docker.yaml
          for i in $(seq 1 60); do
            if docker ps --filter name=gremlin-server --filter status=running -q | grep -q . \
              && bash -c 'cat < /dev/null > /dev/tcp/localhost/8889' 2>/dev/null; then
              echo "Gremlin Server is up"
              exit 0
            fi
            sleep 2
          done
          echo "Gremlin Server failed to start"
          docker logs gremlin-server
          exit 1

      - name: Integration tests
        run: mvn -B verify -Pfull-test -pl spring-data-gremlin
        env:
          GREMLIN_ENDPOINT: localhost
          GREMLIN_PORT: "8889"

      - name: Stop Gremlin Server
        if: always()
        run: docker rm -f gremlin-server || true
