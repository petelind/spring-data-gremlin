name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [17, 21]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build and test
        run: mvn -B verify -Dskip.integration.tests=true

  integration:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Start Gremlin Server
        run: |
          docker run -d --name gremlin-server -p 8889:8182 tinkerpop/gremlin-server:3.8.1
          sleep 15

      - name: Integration tests
        run: mvn -B verify -Pfull-test -pl spring-data-gremlin
        env:
          GREMLIN_ENDPOINT: localhost
          GREMLIN_PORT: "8889"

      - name: Stop Gremlin Server
        if: always()
        run: docker rm -f gremlin-server || true
